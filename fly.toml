# fly.toml — конфиг для fly.io
# Деплой: fly deploy (из корня репо)

app = "checkers-game"
primary_region = "ams"  # Амстердам — ближайший к РФ/СНГ

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # не останавливать машину при отсутствии трафика
  auto_start_machines = true
  min_machines_running = 1     # всегда держать 1 инстанс

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"  # free tier
  memory = "256mb"
